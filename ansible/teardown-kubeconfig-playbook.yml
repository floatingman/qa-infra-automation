---
# teardown-kubeconfig-playbook.yml
#
# Removes the cluster context from the operator's local ~/.kube/config.
# Called automatically by 'make infra-down'.
#
# Variables:
#   kubeconfig_src - path to the kubeconfig file (set by Makefile)

- hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Teardown local kubeconfig
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/teardown-local-kubeconfig.yml"
      vars:
        kubeconfig_src: "{{ kubeconfig_src | default(playbook_dir + '/kubeconfig.yaml') }}"
