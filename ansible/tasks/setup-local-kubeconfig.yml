---
# tasks/setup-local-kubeconfig.yml
#
# Configures kubectl access on the operator's local machine after cluster creation.
#
# Behavior controlled by `kubeconfig_local_mode`:
#   - "copy"   : Overwrite ~/.kube/config with the new kubeconfig (default)
#   - "merge"  : Merge new context into existing ~/.kube/config with a unique name
#   - "skip"   : Do nothing — user manages their own KUBECONFIG
#
# Required variables:
#   - kubeconfig_src : Path to the fetched kubeconfig file (e.g., "{{ playbook_dir }}/kubeconfig.yaml")
#
# Optional variables:
#   - kubeconfig_local_mode  : "copy" | "merge" | "skip" (default: "copy")
#   - kubeconfig_context_name: Name for the merged context (default: derived from source path)
#   - kubeconfig_dest        : Target path (default: ~/.kube/config)
#
# State tracking:
#   Writes a .kubeconfig-state file next to kubeconfig_src so that
#   teardown-local-kubeconfig.yml can reverse the operation during infra-down.

- name: Validate kubeconfig source file exists
  ansible.builtin.stat:
    path: "{{ kubeconfig_src }}"
  register: _kubeconfig_src_stat
  delegate_to: localhost
  become: false
  run_once: true

- name: Fail if kubeconfig source not found
  ansible.builtin.fail:
    msg: >-
      Kubeconfig file not found at {{ kubeconfig_src }}.
      Ensure the cluster formation playbook completed successfully.
  when: not _kubeconfig_src_stat.stat.exists
  run_once: true

- name: Set default kubeconfig destination
  ansible.builtin.set_fact:
    _kubeconfig_dest: "{{ kubeconfig_dest | default(lookup('env', 'HOME') + '/.kube/config') }}"
  run_once: true

# --- MODE: skip ---
- name: Skip local kubeconfig setup
  ansible.builtin.debug:
    msg: |
      kubeconfig_local_mode is "skip" — not configuring local kubectl access.
      The kubeconfig is available at: {{ kubeconfig_src }}
      To use it manually:
        export KUBECONFIG={{ kubeconfig_src }}
        kubectl get nodes
  when: kubeconfig_local_mode | default('copy') == 'skip'
  run_once: true

# --- MODE: copy ---
- name: Copy kubeconfig to local ~/.kube/config
  when: kubeconfig_local_mode | default('copy') == 'copy'
  block:
    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ _kubeconfig_dest | dirname }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Copy kubeconfig to {{ _kubeconfig_dest }}
      ansible.builtin.copy:
        src: "{{ kubeconfig_src }}"
        dest: "{{ _kubeconfig_dest }}"
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Write state file for teardown
      ansible.builtin.copy:
        content: |
          mode: copy
          dest: {{ _kubeconfig_dest }}
          context_name: ""
        dest: "{{ kubeconfig_src | dirname }}/.kubeconfig-state"
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Display copy result
      ansible.builtin.debug:
        msg: |
          Kubeconfig copied to {{ _kubeconfig_dest }}

          You can now use kubectl directly:
            kubectl get nodes
            kubectl get pods -A

          Running 'make infra-down' will clean up this kubeconfig automatically.
      run_once: true

# --- MODE: merge ---
- name: Merge kubeconfig into existing ~/.kube/config
  when: kubeconfig_local_mode | default('copy') == 'merge'
  block:
    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ _kubeconfig_dest | dirname }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Check if existing kubeconfig exists
      ansible.builtin.stat:
        path: "{{ _kubeconfig_dest }}"
      register: _existing_kubeconfig
      delegate_to: localhost
      become: false
      run_once: true

    - name: Set context name for merged kubeconfig
      ansible.builtin.set_fact:
        _context_name: >-
          {{ kubeconfig_context_name | default(
            'rke2-' + (kubeconfig_src | basename | regex_replace('\.ya?ml$', ''))
          ) }}
      run_once: true

    # When no existing config, just copy and rename context
    - name: Copy kubeconfig (no existing config to merge)
      when: not _existing_kubeconfig.stat.exists
      block:
        - name: Copy kubeconfig to {{ _kubeconfig_dest }}
          ansible.builtin.copy:
            src: "{{ kubeconfig_src }}"
            dest: "{{ _kubeconfig_dest }}"
            mode: "0600"
          delegate_to: localhost
          become: false
          run_once: true

        - name: Rename context in merged kubeconfig
          ansible.builtin.command: >
            kubectl config rename-context default {{ _context_name }}
              --kubeconfig {{ _kubeconfig_dest }}
          delegate_to: localhost
          become: false
          run_once: true
          changed_when: true

    # When existing config, use KUBECONFIG merge
    - name: Merge kubeconfig into existing config
      when: _existing_kubeconfig.stat.exists
      block:
        - name: Create temporary copy with renamed context
          ansible.builtin.tempfile:
            state: file
            suffix: .yaml
          register: _temp_kubeconfig
          delegate_to: localhost
          become: false
          run_once: true

        - name: Copy source kubeconfig to temp file
          ansible.builtin.copy:
            src: "{{ kubeconfig_src }}"
            dest: "{{ _temp_kubeconfig.path }}"
            mode: "0600"
          delegate_to: localhost
          become: false
          run_once: true

        - name: Rename context in temporary kubeconfig
          ansible.builtin.command: >
            kubectl config rename-context default {{ _context_name }}
              --kubeconfig {{ _temp_kubeconfig.path }}
          delegate_to: localhost
          become: false
          run_once: true
          changed_when: true
          failed_when: false

        - name: Merge kubeconfigs using KUBECONFIG env var
          ansible.builtin.shell: >
            KUBECONFIG={{ _kubeconfig_dest }}:{{ _temp_kubeconfig.path }}
            kubectl config view --flatten > {{ _kubeconfig_dest }}.merged
          delegate_to: localhost
          become: false
          run_once: true
          changed_when: true

        - name: Replace original kubeconfig with merged version
          ansible.builtin.copy:
            src: "{{ _kubeconfig_dest }}.merged"
            dest: "{{ _kubeconfig_dest }}"
            mode: "0600"
            remote_src: false
          delegate_to: localhost
          become: false
          run_once: true

        - name: Clean up temporary files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ _temp_kubeconfig.path }}"
            - "{{ _kubeconfig_dest }}.merged"
          delegate_to: localhost
          become: false
          run_once: true

    - name: Switch to new context
      ansible.builtin.command: >
        kubectl config use-context {{ _context_name }}
          --kubeconfig {{ _kubeconfig_dest }}
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: true

    - name: Write state file for teardown
      ansible.builtin.copy:
        content: |
          mode: merge
          dest: {{ _kubeconfig_dest }}
          context_name: {{ _context_name }}
        dest: "{{ kubeconfig_src | dirname }}/.kubeconfig-state"
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Display merge result
      ansible.builtin.debug:
        msg: |
          Kubeconfig merged into {{ _kubeconfig_dest }}
          Active context: {{ _context_name }}

          To switch contexts:
            kubectl config use-context {{ _context_name }}
            kubectl config get-contexts

          To use directly:
            kubectl get nodes

          Running 'make infra-down' will remove this context automatically.
      run_once: true
