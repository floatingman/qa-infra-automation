---
# tasks/teardown-local-kubeconfig.yml
#
# Removes the cluster context from the operator's local ~/.kube/config
# after the cluster infrastructure is destroyed.
#
# Reads the .kubeconfig-state file written by setup-local-kubeconfig.yml
# to determine what mode was used and what context name to remove.
#
# Required variables:
#   - kubeconfig_src : Path to the kubeconfig file used during setup
#                      (same path passed to setup-local-kubeconfig.yml)
#
# This task is safe to run idempotently — it silently skips when nothing
# matches or when no state file exists.

- name: Set state file path
  ansible.builtin.set_fact:
    _state_file: "{{ kubeconfig_src | dirname }}/.kubeconfig-state"
  run_once: true

- name: Check if state file exists
  ansible.builtin.stat:
    path: "{{ _state_file }}"
  register: _state_file_stat
  delegate_to: localhost
  become: false
  run_once: true

- name: Read state file
  when: _state_file_stat.stat.exists
  block:
    - name: Read kubeconfig state
      ansible.builtin.slurp:
        src: "{{ _state_file }}"
      register: _state_content
      delegate_to: localhost
      become: false
      run_once: true

    - name: Parse state file
      ansible.builtin.set_fact:
        _kubeconfig_state: "{{ _state_content.content | b64decode | from_yaml }}"
      run_once: true

    - name: Display teardown plan
      ansible.builtin.debug:
        msg: >-
          Cleaning up kubeconfig: mode={{ _kubeconfig_state.mode }},
          context={{ _kubeconfig_state.context_name | default('(none)') }},
          dest={{ _kubeconfig_state.dest }}
      run_once: true

    # --- MODE: copy — remove ~/.kube/config entirely ---
    - name: Remove copied kubeconfig
      when: _kubeconfig_state.mode == 'copy'
      block:
        - name: Check if kubeconfig file exists
          ansible.builtin.stat:
            path: "{{ _kubeconfig_state.dest }}"
          register: _copied_kubeconfig_stat
          delegate_to: localhost
          become: false
          run_once: true

        - name: Remove kubeconfig file
          ansible.builtin.file:
            path: "{{ _kubeconfig_state.dest }}"
            state: absent
          delegate_to: localhost
          become: false
          run_once: true
          when: _copied_kubeconfig_stat.stat.exists

        - name: Display removal result
          ansible.builtin.debug:
            msg: "Removed {{ _kubeconfig_state.dest }} (was copied during cluster setup)"
          run_once: true

    # --- MODE: merge — remove context, cluster, and user entries ---
    - name: Remove merged context from kubeconfig
      when: _kubeconfig_state.mode == 'merge'
      block:
        - name: Check if kubeconfig file exists
          ansible.builtin.stat:
            path: "{{ _kubeconfig_state.dest }}"
          register: _merged_kubeconfig_stat
          delegate_to: localhost
          become: false
          run_once: true

        - name: Remove context, cluster, and user entries
          when: _merged_kubeconfig_stat.stat.exists
          block:
            - name: Check if context exists
              ansible.builtin.command: >
                kubectl config get-contexts {{ _kubeconfig_state.context_name }}
                  --kubeconfig {{ _kubeconfig_state.dest }}
              register: _context_check
              delegate_to: localhost
              become: false
              run_once: true
              failed_when: false
              changed_when: false

            - name: Extract and remove context entries
              when: _context_check.rc == 0
              block:
                - name: Get cluster name for context
                  ansible.builtin.shell: >
                    kubectl config view
                      --kubeconfig {{ _kubeconfig_state.dest }}
                      -o "jsonpath={.contexts[?(@.name==\"{{ _kubeconfig_state.context_name }}\")].context.cluster}"
                  register: _cluster_name
                  delegate_to: localhost
                  become: false
                  run_once: true
                  changed_when: false

                - name: Get user name for context
                  ansible.builtin.shell: >
                    kubectl config view
                      --kubeconfig {{ _kubeconfig_state.dest }}
                      -o "jsonpath={.contexts[?(@.name==\"{{ _kubeconfig_state.context_name }}\")].context.user}"
                  register: _user_name
                  delegate_to: localhost
                  become: false
                  run_once: true
                  changed_when: false

                # Unset current-context if it points to the context being removed
                - name: Unset current-context if it matches
                  ansible.builtin.shell: >
                    current=$(kubectl config current-context --kubeconfig {{ _kubeconfig_state.dest }} 2>/dev/null || true);
                    if [ "$current" = "{{ _kubeconfig_state.context_name }}" ]; then
                      kubectl config unset current-context --kubeconfig {{ _kubeconfig_state.dest }};
                      echo "changed";
                    fi
                  register: _unset_current
                  delegate_to: localhost
                  become: false
                  run_once: true
                  changed_when: "'changed' in _unset_current.stdout"

                - name: Delete context
                  ansible.builtin.command: >
                    kubectl config delete-context {{ _kubeconfig_state.context_name }}
                      --kubeconfig {{ _kubeconfig_state.dest }}
                  delegate_to: localhost
                  become: false
                  run_once: true
                  changed_when: true

                - name: Delete cluster entry
                  ansible.builtin.command: >
                    kubectl config delete-cluster {{ _cluster_name.stdout }}
                      --kubeconfig {{ _kubeconfig_state.dest }}
                  delegate_to: localhost
                  become: false
                  run_once: true
                  changed_when: true
                  when: _cluster_name.stdout | length > 0
                  failed_when: false

                - name: Delete user entry
                  ansible.builtin.command: >
                    kubectl config unset users.{{ _user_name.stdout | regex_replace('\\.', '\\\\.') }}
                      --kubeconfig {{ _kubeconfig_state.dest }}
                  delegate_to: localhost
                  become: false
                  run_once: true
                  changed_when: true
                  when: _user_name.stdout | length > 0
                  failed_when: false

                - name: Display removal result
                  ansible.builtin.debug:
                    msg: >
                      Removed context '{{ _kubeconfig_state.context_name }}',
                      cluster '{{ _cluster_name.stdout }}',
                      user '{{ _user_name.stdout }}' from {{ _kubeconfig_state.dest }}
                  run_once: true

            - name: Context not found (already removed)
              ansible.builtin.debug:
                msg: >-
                  Context '{{ _kubeconfig_state.context_name }}' not found in
                  {{ _kubeconfig_state.dest }} — already removed or never added.
              when: _context_check.rc != 0
              run_once: true

    # --- Clean up state file and source kubeconfig ---
    - name: Remove state file
      ansible.builtin.file:
        path: "{{ _state_file }}"
        state: absent
      delegate_to: localhost
      become: false
      run_once: true

    - name: Remove source kubeconfig
      ansible.builtin.file:
        path: "{{ kubeconfig_src }}"
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
      failed_when: false

# --- No state file: try to clean up source kubeconfig anyway ---
- name: Clean up source kubeconfig (no state file)
  when: not _state_file_stat.stat.exists
  block:
    - name: Remove source kubeconfig if it exists
      ansible.builtin.file:
        path: "{{ kubeconfig_src }}"
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
      failed_when: false

    - name: Display skip message
      ansible.builtin.debug:
        msg: >
          No .kubeconfig-state file found — kubeconfig may have been set up manually.
          Removed {{ kubeconfig_src }} if present. Check ~/.kube/config manually
          if you need to clean up stale contexts.
      run_once: true
